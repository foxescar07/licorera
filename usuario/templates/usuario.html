{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro Usuario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #E8C898;
        }

        .card-custom {
            max-width: 400px;
            margin: auto;
            margin-top: 80px;
            padding: 30px;
            border-radius: 20px;
            background: #f1e9dc;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        .logo {
            width: 100px;
            margin-bottom: 15px;
        }

        .form-control {
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
        }

        .btn-custom {
            background-color: #B7372A;
            border-radius: 10px;
            height: 45px;
        }

        .success-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgb(0, 0, 0);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .success-box {
            background: #B7372A;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        .success-box h4 {
            color: #28a745;
        }
    </style>
</head>

<body>

<div id="mensaje-exito" class="success-overlay">
    <div class="success-box">
        <h4>Usuario guardado con éxito</h4>
    </div>
</div>

<div class="card-custom">

<img src="{% static 'img/logo.jpeg' %}" alt="Logo" class="logo"
    class="rounded-circle mx-auto d-block"
     style="width:120px; height:120px; object-fit:cover;">
<h3 class="mb-4">Registro usuario</h3>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="identificacion" class="form-control" placeholder="Identificación usuario" required>

        <input type="text" name="nombre" class="form-control" placeholder="Nombre usuario" required>

        <input type="text" name="telefono" class="form-control" placeholder="Teléfono usuario" required>

        <input type="text" name="direccion" class="form-control" placeholder="Dirección usuario" required>

        <button type="submit" class="btn btn-custom w-100">Guardar</button>
    </form>

</div>

<script>
    {% if messages %}
        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById('mensaje-exito').style.display = 'flex';

            setTimeout(() => {
                window.location.href = "{% url 'usuario' %}";
            }, 2000);
        });
    {% endif %}
</script>

</body>
</html>
