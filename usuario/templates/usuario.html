{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Usuario - CYS</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
</head>

<body class="d-flex flex-column min-vh-100" style="background-color: #E8C898;">

    <div class="p-5 rounded-4 shadow-lg text-center bg-white border border-light">
    <i class="fas fa-check-circle display-1 text-success mb-3"></i>
    <h4 class="fw-bold text-dark">Usuario guardado con éxito</h4>
    </div>
<header class="container-fluid py-3 px-4 d-flex justify-content-end">
    <a href="/usuario/" class="btn btn-danger fw-bold px-4 shadow-sm z-3">
        Volver al Inicio
    </a>
</header>
    <main class="flex-grow-1 d-flex align-items-center justify-content-center pb-5">
        <div class="card border-0 shadow-lg p-4 p-md-5 rounded-5 text-center" style="max-width: 400px; background-color: #f1e9dc;">
            
            <div class="mb-3">
                <img src="{% static 'img/logo.jpeg' %}" alt="Logo" class="rounded-circle shadow-sm" style="width: 100px; height: 100px; object-fit: cover;">
            </div>
            
            <h3 class="mb-4 fw-bold text-dark">Registro usuario</h3>

            <form method="POST">
                {% csrf_token %}

                <input type="text" name="identificacion" class="form-control form-control-lg rounded-3 mb-3 text-center border-0 shadow-sm" placeholder="Identificación usuario" required>

                <input type="text" name="nombre" class="form-control form-control-lg rounded-3 mb-3 text-center border-0 shadow-sm" placeholder="Nombre usuario" required>

                <input type="text" name="telefono" class="form-control form-control-lg rounded-3 mb-3 text-center border-0 shadow-sm" placeholder="Teléfono usuario" required>

                <input type="text" name="direccion" class="form-control form-control-lg rounded-3 mb-4 text-center border-0 shadow-sm" placeholder="Dirección usuario" required>

                <button type="submit" class="btn w-100 text-white fw-bold shadow-sm" style="background-color: #B7372A; height: 50px; border-radius: 12px;">
                    Guardar usuario
                </button>
            </form>
        </div>
    </main>

    <script>
        // Lógica de Django Messages para mostrar el Overlay
        {% if messages %}
            document.addEventListener("DOMContentLoaded", function() {
                const overlay = document.getElementById('mensaje-exito');
                overlay.style.setProperty('display', 'flex', 'important');

                setTimeout(() => {
                    window.location.href = "{% url 'usuario' %}";
                }, 2000);
            });
        {% endif %}
    </script>

</body>
</html>
