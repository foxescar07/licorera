{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYS - Gestión Licorera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100" style="background-color: #E8C898; font-family: 'Roboto', sans-serif;">

    <div class="container-fluid d-flex justify-content-between p-4">
        <button class="btn btn-danger px-4 shadow-sm fw-bold border-0" 
                style="background-color: #B7372A; border-radius: 15px; font-family: 'Oswald', sans-serif;" 
                data-bs-toggle="collapse" data-bs-target="#seccionRecuperar">
            Olvidé mi contraseña
        </button>
        
        <button class="btn btn-danger px-4 shadow-sm fw-bold border-0" 
                style="background-color: #B7372A; border-radius: 15px; font-family: 'Oswald', sans-serif;" 
                data-bs-toggle="collapse" data-bs-target="#seccionRegistro">
            Crear cuenta
        </button>
    </div>

    <div class="flex-grow-1 d-flex flex-column align-items-center justify-content-center" style="margin-top: -50px;">
        
        <div class="card border-0 p-5 text-center shadow-lg" id="contenedorPrincipal" 
             style="background-color: #f1e9dc; width: 100%; max-width: 400px; border-radius: 20px;">
            
            <div class="mb-4">
                <img src="{% static 'img/logo.jpeg' %}" alt="Logo" 
                     class="rounded-circle border border-danger border-3 shadow-sm" 
                     style="width: 110px; height: 110px; object-fit: cover;">
            </div>

            <div class="collapse show" id="seccionLogin" data-bs-parent="#contenedorPrincipal">
                <h2 class="fw-bold mb-4 display-6" style="color: #B7372A; font-family: 'Oswald', sans-serif;">CYS</h2>
                
                <form method="POST">
                    {% csrf_token %}
                    <input type="hidden" name="accion" value="login">
                    <div class="mb-3">
                        <input type="text" name="usuario_input" class="form-control text-center py-2 border-0 shadow-sm" 
                               placeholder="Usuario" style="border-radius: 12px;" required>
                    </div>
                    <div class="mb-4">
                        <input type="password" name="clave_input" class="form-control text-center py-2 border-0 shadow-sm" 
                               placeholder="Contraseña" style="border-radius: 12px;" required>
                    </div>
                    <button type="submit" class="btn btn-danger w-100 py-2 fw-bold shadow" 
                            style="background-color: #B7372A; border-radius: 12px; font-family: 'Oswald', sans-serif;">
                        ENTRAR
                    </button>
                </form>
            </div>

            <div class="collapse" id="seccionRegistro" data-bs-parent="#contenedorPrincipal">
                <h3 class="fw-bold mb-3 h4" style="color: #B7372A; font-family: 'Oswald', sans-serif;">REGISTRARSE</h3>
                <form method="POST">
                    {% csrf_token %}
                    <input type="hidden" name="accion" value="registrar">
                    <input type="text" name="nombre_input" class="form-control mb-2 text-center shadow-sm border-0" placeholder="Nombre completo" style="border-radius: 12px;">
                    <input type="text" name="user_nuevo" class="form-control mb-2 text-center shadow-sm border-0" placeholder="Usuario" style="border-radius: 12px;">
                    <input type="password" name="pass_nueva" class="form-control mb-3 text-center shadow-sm border-0" placeholder="Clave" style="border-radius: 12px;">
                    
                    <select name="rol_nuevo" class="form-select mb-3 text-center shadow-sm border-0" style="border-radius: 12px;">
                        <option value="empleado">Empleado</option>
                        <option value="admin">Administrador</option>
                    </select>
                    <button type="submit" class="btn btn-danger w-100 py-2 fw-bold" style="background-color: #B7372A; border-radius: 12px;">GUARDAR</button>
                </form>
                <button class="btn btn-link text-danger mt-2 fw-bold text-decoration-none btn-sm" data-bs-toggle="collapse" data-bs-target="#seccionLogin">Volver</button>
            </div>

            <div class="collapse" id="seccionRecuperar" data-bs-parent="#contenedorPrincipal">
                <h3 class="fw-bold mb-3 h4" style="color: #B7372A; font-family: 'Oswald', sans-serif;">RECUPERAR</h3>
                <form method="POST">
                    {% csrf_token %}
                    <input type="hidden" name="accion" value="recuperar">
                    <input type="text" name="user_recuperar" class="form-control mb-3 text-center shadow-sm border-0" placeholder="Tu Usuario" style="border-radius: 12px;">
                    <button type="submit" class="btn btn-danger w-100 py-2 fw-bold" style="background-color: #B7372A; border-radius: 12px;">ENVIAR</button>
                </form>
                <button class="btn btn-link text-danger mt-2 fw-bold text-decoration-none btn-sm" data-bs-toggle="collapse" data-bs-target="#seccionLogin">Volver</button>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
