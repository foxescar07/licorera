<div id="stock-widget" class="mb-4 p-3 d-flex align-items-center justify-content-between"
     style="border-radius:var(--radius); transition:background .4s ease, border-color .4s ease;
            border:1px solid transparent; min-height:56px;">

  <div class="d-flex align-items-center gap-3" style="flex:1; min-width:0;">

    <div id="sw-icono" style="flex-shrink:0; font-size:1.4rem; transition:opacity .3s;"></div>

    <div style="flex:1; min-width:0;">
      <div id="sw-titulo"
           style="font-family:'Rajdhani',sans-serif; font-weight:700; font-size:.9rem;
                  letter-spacing:.08em; text-transform:uppercase; transition:color .3s;">
      </div>
      <div style="overflow:hidden; height:1.25rem; position:relative; margin-top:.1rem;">
        <div id="sw-carrusel"
             style="position:absolute; width:100%;
                    transition:transform .55s cubic-bezier(.4,0,.2,1);">
        </div>
      </div>
    </div>

  </div>

  <div id="sw-badge"
       style="flex-shrink:0; margin-left:1rem; font-family:'Rajdhani',sans-serif;
              font-weight:700; font-size:.75rem; letter-spacing:.06em;
              padding:.35rem .85rem; border-radius:20px; white-space:nowrap;
              transition:background .3s, color .3s, border-color .3s;">
  </div>

</div>

<!-- WIDGET COMPRAS PENDIENTES -->
<div class="mb-3 px-3 py-2"
     style="border-radius:var(--radius); background:rgba(77,168,218,0.06);
            border:1px solid rgba(77,168,218,0.25); transition:0.3s;">

  <div class="d-flex align-items-center justify-content-between mb-1">
    <div class="d-flex align-items-center gap-2">
      <i class="bi bi-clock-history" style="color:#4DA8DA; font-size:.85rem;"></i>
      <span style="font-family:'Rajdhani',sans-serif; font-weight:700; font-size:.75rem;
                   letter-spacing:.08em; text-transform:uppercase; color:#4DA8DA;">
        Pendientes de Recibir
      </span>
    </div>
    <span style="background:rgba(77,168,218,0.15); color:#4DA8DA;
                 border:1px solid rgba(77,168,218,0.3); border-radius:20px;
                 font-size:.68rem; font-weight:700; padding:.15rem .6rem;">
      {{ total_pendientes }} compra{{ total_pendientes|pluralize:"s" }}
    </span>
  </div>

  {% if pendientes %}
    <div style="display:flex; flex-direction:column; gap:3px;">
      {% for c in pendientes %}
      <div style="display:flex; align-items:center; justify-content:space-between;
                  padding:4px 10px; border-radius:7px;
                  background:#0b1220; border:1px solid rgba(77,168,218,0.1);">
        <div>
          <span style="color:#cbd5e1; font-size:.76rem; font-weight:600;">
            {{ c.producto.nombre }}
          </span>
          <span style="color:#475569; font-size:.68rem; margin-left:5px;">
            <i class="bi bi-building me-1"></i>{{ c.proveedor.nombre_empresa }}
          </span>
        </div>
        <div class="d-flex align-items-center gap-2">
          <span style="color:#4DA8DA; font-size:.7rem; font-weight:700; margin-right:6px;">
            x{{ c.cantidad }}
          </span>
          <form method="POST" action="{% url 'marcar_recibida' c.id %}" style="display:inline;">
            {% csrf_token %}
            <button type="submit"
                    title="Marcar como recibida"
                    style="background:rgba(74,222,128,0.1); border:1px solid rgba(74,222,128,0.25);
                           color:#4ade80; border-radius:5px; padding:2px 8px;
                           font-size:.66rem; font-weight:700; cursor:pointer; transition:0.2s;"
                    onmouseover="this.style.background='rgba(74,222,128,0.2)'"
                    onmouseout="this.style.background='rgba(74,222,128,0.1)'">
              <i class="bi bi-check2 me-1"></i>Recibida
            </button>
          </form>
        </div>
      </div>
      {% endfor %}
    </div>
  {% else %}
    <div style="text-align:center; padding:6px; color:#475569; font-size:.74rem;">
      <i class="bi bi-check-circle me-1" style="color:#27ae60;"></i>
      Sin compras pendientes
    </div>
  {% endif %}

</div>

<script>
(function () {

  const INTERVALO_POLLING = 8000;
  const INTERVALO_SLIDE   = 3500;

  const widget   = document.getElementById('stock-widget');
  const swIcono  = document.getElementById('sw-icono');
  const swTitulo = document.getElementById('sw-titulo');
  const swCarr   = document.getElementById('sw-carrusel');
  const swBadge  = document.getElementById('sw-badge');

  const P = {
    verde: {
      bg:     'rgba(39,174,96,.08)',
      border: 'rgba(39,174,96,.35)',
      color:  '#27ae60',
      badgeBg:'rgba(39,174,96,.15)',
      icono:  '<i class="bi bi-check-circle-fill" style="color:#27ae60;"></i>',
      titulo: 'Stock en Estado Normal',
      badge:  'Todo en orden ✓',
    },
    amarillo: {
      bg:     'rgba(241,196,15,.08)',
      border: 'rgba(241,196,15,.4)',
      color:  '#c9a800',
      badgeBg:'rgba(241,196,15,.18)',
      icono:  '<i class="bi bi-exclamation-circle-fill" style="color:#c9a800;"></i>',
      titulo: 'Stock Bajo',
      badge:  null,
    },
    rojo: {
      bg:     'rgba(192,57,43,.10)',
      border: 'rgba(192,57,43,.40)',
      color:  '#c0392b',
      badgeBg:'rgba(192,57,43,.15)',
      icono:  '<i class="bi bi-exclamation-triangle-fill" style="color:#c0392b;"></i>',
      titulo: '¡Atención — Stock Crítico!',
      badge:  null,
    },
  };

  let timerSlide  = null;
  let slideActual = 0;
  let listaSlides = [];

  function pintar(data) {
    const pal = P[data.estado];

    widget.style.background  = pal.bg;
    widget.style.borderColor = pal.border;
    swIcono.innerHTML        = pal.icono;
    swTitulo.style.color     = pal.color;
    swTitulo.textContent     = pal.titulo;
    swBadge.style.background = pal.badgeBg;
    swBadge.style.color      = pal.color;
    swBadge.style.border     = `1px solid ${pal.border}`;
    swBadge.textContent      = pal.badge
      || `${data.total_alertas} producto${data.total_alertas !== 1 ? 's' : ''} con alerta`;

    if (data.estado === 'verde') {
      arrancarCarrusel([]);
    } else {
      const todos = [
        ...data.criticos.map(p => ({ ...p, nivel: 'critico' })),
        ...data.bajos.map(p    => ({ ...p, nivel: 'bajo'    })),
      ];
      arrancarCarrusel(todos);
    }
  }

  function arrancarCarrusel(lista) {
    clearInterval(timerSlide);
    swCarr.style.transform = 'translateY(0)';
    swCarr.innerHTML       = '';
    listaSlides            = lista;
    slideActual            = 0;

    if (lista.length === 0) {
      swCarr.innerHTML = `
        <div style="height:1.25rem; line-height:1.25rem; font-size:.78rem; color:var(--texto-muted);">
          Todos los productos tienen stock suficiente.
        </div>`;
      return;
    }

    lista.forEach(item => {
      const color = item.nivel === 'critico' ? '#c0392b' : '#c9a800';
      const div   = document.createElement('div');
      div.style.cssText = `
        height:1.25rem; line-height:1.25rem; font-size:.78rem;
        color:var(--texto-muted); white-space:nowrap;
        overflow:hidden; text-overflow:ellipsis;`;
      div.innerHTML =
        `<strong style="color:${color};">${item.nombre}</strong>` +
        ` — Solo <strong style="color:${color};">${item.cantidad}</strong> unidad${item.cantidad !== 1 ? 'es' : ''} restante${item.cantidad !== 1 ? 's' : ''}`;
      swCarr.appendChild(div);
    });

    if (lista.length === 1) return;

    timerSlide = setInterval(() => {
      slideActual = (slideActual + 1) % lista.length;
      swCarr.style.transform = `translateY(-${slideActual * 1.25}rem)`;
    }, INTERVALO_SLIDE);
  }

  function actualizar() {
    fetch("{% url 'producto:stock_status' %}?_=" + Date.now(), {
      cache: 'no-store',
      headers: { 'Cache-Control': 'no-cache' }
    })
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(data => pintar(data))
      .catch(() => {});
  }

  actualizar();
  setInterval(actualizar, INTERVALO_POLLING);

})();
</script>
