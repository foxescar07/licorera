{% extends "base.html" %}
{% load static %}
{% load crispy_forms_tags %}

{% block content %}
<section class="container py-5">
    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h1 class="fw-bold text-white mb-1">Editar Proveedor</h1>
            <p class="mb-0 text-white-50">
                <i class="bi bi-clock-history me-1"></i> 
                Última modificación: <span class="text-white fw-bold">{{ proveedor.ultima_modificacion|date:"d/m/Y H:i" }}</span>
            </p>
        </div>
        <a href="{% url 'proveedores' %}" class="btn btn-outline-light rounded-pill px-4">
            <i class="bi bi-arrow-left me-2"></i>Volver
        </a>
    </div>

    <div class="card border-0 shadow-lg rounded-4 overflow-hidden bg-white">
        <div class="row g-0">
            <div class="col-md-1" style="background-color: var(--sasa-rojo, #912F40);"></div>
            
            <div class="col-md-11 p-4 p-lg-5 text-dark">
                <form method="POST">
    {% csrf_token %}

    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">Proveedor</label>
            <input type="text" class="form-control bg-secondary text-white" 
                   value="{{ proveedor.nombre_empresa }}" disabled>
        </div>

        <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">Producto</label>
            {{ form.producto }}
        </div>

        <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">Cantidad</label>
            {{ form.cantidad }}
        </div>
    </div>

    <button type="submit" class="btn w-100 fw-semibold mt-3"
            style="background:#4DA8DA; color:#011936;">
        Registrar Compra
    </button>

                    <div class="d-flex justify-content-end align-items-center gap-3 mt-5 pt-3 border-top">
                        <a href="{% url 'proveedores' %}" class="btn btn-light px-4 py-2 fw-bold text-muted border rounded-3">
                            CANCELAR
                        </a>
                       
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
