{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<!-- Fuente -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
--rojo:#B7372A;
--amarillo:#DE9C12;
--naranja:#D75833;
--beige:#E8C898;
--negro:#201E1F;
}

body{
background:var(--beige);
font-family:'Inter',sans-serif;
}

.sidebar{
width:250px;
}

.header{
background:var(--naranja);
color:white;
}
</style>
</head>

<body class="d-flex">

<!-- SIDEBAR -->
<div class="sidebar d-flex flex-column align-items-center position-fixed top-0 start-0 vh-100 pt-5 bg-light">

<div class="d-flex align-items-center justify-content-center bg-danger text-white rounded-circle mb-2" style="width:90px;height:90px;">
<i class="bi bi-person-fill fs-3"></i>
</div>

<h5>Usuario</h5>

<div class="d-flex flex-column w-100 mt-4 px-3 gap-2">
<a class="text-decoration-none text-dark p-2 rounded">🏠 Tablero</a>
<a class="text-decoration-none text-dark p-2 rounded">📦 Productos</a>
<a class="text-decoration-none text-white p-2 rounded" style="background:var(--rojo);">🚚 Proveedores</a>
</div>

</div>

<!-- CONTENIDO -->
<div class="flex-grow-1" style="margin-left:250px;">

<!-- HEADER -->
<div class="header d-flex justify-content-center align-items-center py-2">
    
<h4 class="m-0">DISTRIBUCIONES C Y S</h4>
</div>

<div class="p-4">

<!-- TITULO + BOTON -->
<div class="d-flex justify-content-between align-items-center mb-3">
<h3>Proveedores</h3>

<button class="btn text-white rounded-pill"
style="background:var(--rojo);"
onclick="mostrarFormulario()">
<i class="bi bi-plus-circle"></i> Nuevo
</button>
</div>

<!-- FORMULARIO -->
<div id="formulario" class="position-fixed top-0 start-0 w-100 h-100 d-none align-items-center justify-content-center" style="background: rgba(0,0,0,0.4); z-index:999;">

  <div class="card shadow-lg" style="width:500px; border-radius:15px;">

    <!-- HEADER -->
    <div class="card-header text-white" style="background: var(--rojo);">
      <h5 class="mb-0">Nuevo Proveedor</h5>
    </div>

    <!-- BODY -->
    <div class="card-body">

      <input type="hidden" id="id">

      <div class="mb-2">
        <input id="nombre" class="form-control" placeholder="Nombre">
      </div>

      <div class="mb-2">
        <input id="empresa" class="form-control" placeholder="Empresa">
      </div>

      <div class="mb-2">
        <input id="telefono" class="form-control" placeholder="Teléfono">
      </div>

      <div class="mb-2">
        <input id="correo" class="form-control" placeholder="Correo">
      </div>

    </div>
<div class="card-footer d-flex gap-2">

      <button class="btn w-100 text-white"
      style="background: var(--rojo);"
      onclick="guardar()">
      Guardar
      </button>

      <button class="btn w-100 border"
      style="border-color: var(--rojo); color: var(--rojo);"
      onclick="cerrarFormulario()">
      Cancelar
      </button>

    </div>

  </div>

</div>
</div>
<table class="table table-hover text-center shadow">
<thead style="background:var(--rojo); color:white;">
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Empresa</th>
<th>Teléfono</th>
<th>Correo</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>

</div>
</div>

<script>
let datos = JSON.parse(localStorage.getItem("proveedores")) || [];
let contador = datos.length ? datos[datos.length-1].id+1 : 1;

function pintar(){
tabla.innerHTML="";
datos.forEach(p=>{
tabla.innerHTML+=`
<tr>
<td>${p.id}</td>
<td>${p.nombre}</td>
<td>${p.empresa}</td>
<td>${p.telefono}</td>
<td>${p.correo}</td>
<td>
<button class="btn btn-warning btn-sm" onclick="editar(${p.id})">✏️</button>
<button class="btn btn-danger btn-sm" onclick="eliminar(${p.id})">🗑️</button>
</td>
</tr>`;
});
}

function mostrarFormulario(){
formulario.classList.remove("d-none");
formulario.classList.add("d-flex"); 
limpiar();
}

function cerrarFormulario(){
formulario.classList.add("d-none");
formulario.classList.remove("d-flex");
}
function guardar(){
let id=document.getElementById("id").value;

let obj={
id: id?Number(id):contador++,
nombre:nombre.value,
empresa:empresa.value,
telefono:telefono.value,
correo:correo.value
};

if(id){
datos=datos.map(p=>p.id==id?obj:p);
}else{
datos.push(obj);
}

localStorage.setItem("proveedores",JSON.stringify(datos));
pintar();
cerrarFormulario();
}

function editar(id){
let p=datos.find(x=>x.id==id);

document.getElementById("id").value=p.id;
nombre.value=p.nombre;
empresa.value=p.empresa;
telefono.value=p.telefono;
correo.value=p.correo;

mostrarFormulario();
}

function eliminar(id){
if(confirm("¿Eliminar proveedor?")){
datos=datos.filter(p=>p.id!=id);
localStorage.setItem("proveedores",JSON.stringify(datos));
pintar();
}
}

function limpiar(){
document.getElementById("id").value="";
nombre.value="";
empresa.value="";
telefono.value="";
correo.value="";
}

pintar();
</script>

</body>
</html>
