{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/jpeg" href="{% static 'img/logo.jpeg' %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribuciones C Y S</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            --color-principal: #B7372A; /* Rojo C&S */
            --color-secundario: #E8C898; /* Beige Fondo */
            --rojo-vibrante: #D75833;
            --texto-menu: #201E1F;
        }

        body {
            background-color: var(--color-secundario);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Header */
        header {
            background-color: var(--color-principal) !important;
            height: 70px;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            min-height: calc(100vh - 70px);
            background-color: white !important;
        }

        .sidebar .list-group-item {
            border: none;
            padding: 1rem 1.5rem;
            transition: 0.3s;
            font-weight: 500;
            color: var(--texto-menu);
        }

        .sidebar .list-group-item:hover {
            background-color: var(--color-principal) !important;
            color: white !important;
        }

        .sidebar .list-group-item.active {
            background-color: var(--color-principal) !important;
            color: white !important;
        }

        /* Botones */
        .btn-principal {
            background-color: var(--color-principal);
            color: var(--color-secundario);
            border: none;
            font-weight: 600;
        }

        .btn-principal:hover {
            background-color: var(--rojo-vibrante);
            color: white;
        }

        /* Contenedores de vista */
        .view-section { display: none; }
        .view-section.active { display: block; }

        .card { border-radius: 15px; }
        .table-danger { --bs-table-bg: var(--color-principal); --bs-table-color: white; }
    </style>
</head>
<body>

    <header class="text-white py-3 px-4 shadow-sm d-flex align-items-center gap-3 position-sticky top-0 z-3">
        <h4 class="mb-0 fw-semibold text-center w-100">DISTRIBUCIONES C Y S</h4>
    </header>

    <div class="d-flex">
        <aside class="sidebar border-end shadow-sm d-none d-md-block">
            <div class="text-center pt-5 pb-4">
                <div class="bg-danger rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3" style="width:70px;height:70px; background-color: var(--color-principal) !important;">
                    <i class="bi bi-person-fill text-white fs-3"></i>
                </div>
                <h5 class="fw-bold mb-0">Usuario</h5>
            </div>
            <div class="list-group list-group-flush">
                <a href="#" class="list-group-item list-group-item-action border-0">Tablero Principal</a>
                <a href="#" class="list-group-item list-group-item-action border-0">Productos</a>
                <a href="#" class="list-group-item list-group-item-action border-0 active" onclick="showView('lista')">Proveedores</a>
                <a href="#" class="list-group-item list-group-item-action border-0">Reportes</a>
            </div>
        </aside>

        <main class="flex-grow-1 p-4">
            
            <section id="vistaLista" class="view-section active">
                <h2 class="text-center fw-bold mb-5">Gestión de Proveedores</h2>
                
                <div class="d-flex justify-content-end mb-4">
                    <button class="btn btn-principal px-4 py-2" onclick="showView('registro')">
                        <i class="bi bi-plus-circle"></i> Nuevo Proveedor
                    </button>
                </div>

                <div class="card shadow border-0 overflow-hidden">
                    <div class="table-responsive">
                        <table class="table table-hover text-center align-middle mb-0">
                            <thead class="table-danger">
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Empresa</th>
                                    <th>Teléfono</th>
                                    <th>Correo</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tablaProveedores">
                                </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section id="vistaRegistro" class="view-section">
                <div class="row justify-content-center">
                    <div class="col-lg-6 col-md-10">
                        <div class="card shadow border-0 p-4">
                            <h4 class="text-center mb-4 fw-bold" style="color: var(--color-principal);">Registro de Proveedor</h4>
                            
                            <form id="formProveedor">
                                {% csrf_token %}
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Nombre del proveedor</label>
                                    <input type="text" id="nombre" class="form-control" placeholder="Ingrese el nombre" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Empresa</label>
                                    <input type="text" id="empresa" class="form-control" placeholder="Nombre de la empresa" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Teléfono</label>
                                    <input type="text" id="telefono" class="form-control" placeholder="Número de teléfono" required>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label fw-bold">Correo electrónico</label>
                                    <input type="email" id="correo" class="form-control" placeholder="ejemplo@email.com" required>
                                </div>
                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-principal py-2">Guardar proveedor</button>
                                    <button type="button" class="btn btn-outline-secondary py-2" onclick="showView('lista')">Cancelar</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Lógica de Navegación entre vistas
        function showView(view) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            if(view === 'lista') {
                document.getElementById('vistaLista').classList.add('active');
                mostrarProveedores();
            } else {
                document.getElementById('vistaRegistro').classList.add('active');
            }
        }

        // Lógica de Datos (LocalStorage)
        let proveedores = JSON.parse(localStorage.getItem("proveedores")) || [];
        const tabla = document.getElementById("tablaProveedores");

        function mostrarProveedores() {
            tabla.innerHTML = "";
            proveedores.forEach((p, i) => {
                tabla.innerHTML += `
                <tr>
                    <td>${i + 1}</td>
                    <td>${p.nombre}</td>
                    <td>${p.empresa}</td>
                    <td>${p.telefono}</td>
                    <td>${p.correo}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary me-1" onclick="editar(${i})"><i class="bi bi-pencil-square"></i></button>
                        <button class="btn btn-sm btn-outline-danger" onclick="eliminar(${i})"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>`;
            });
        }

        // Guardar Proveedor
        document.getElementById("formProveedor").addEventListener("submit", function(e) {
            e.preventDefault();
            const nuevo = {
                nombre: document.getElementById("nombre").value,
                empresa: document.getElementById("empresa").value,
                telefono: document.getElementById("telefono").value,
                correo: document.getElementById("correo").value
            };
            proveedores.push(nuevo);
            localStorage.setItem("proveedores", JSON.stringify(proveedores));
            this.reset();
            showView('lista');
        });

        // Eliminar
        function eliminar(i) {
            if(confirm("¿Eliminar este proveedor?")) {
                proveedores.splice(i, 1);
                localStorage.setItem("proveedores", JSON.stringify(proveedores));
                mostrarProveedores();
            }
        }

        // Editar
        function editar(i) {
            let n = prompt("Nuevo nombre:", proveedores[i].nombre);
            if(n) {
                proveedores[i].nombre = n;
                localStorage.setItem("proveedores", JSON.stringify(proveedores));
                mostrarProveedores();
            }
        }

        // Carga inicial
        mostrarProveedores();
    </script>
</body>
</html>
