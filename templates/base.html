{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}CYS Ltda{% endblock %}</title>

  <link rel="icon" type="image/jpeg" href="{% static 'img/logo.jpeg' %}">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  {% block extra_css %}{% endblock %}


  <!-- Aplicar configuración global sin parpadeo -->
<script>
(function () {
  const cfg = JSON.parse(localStorage.getItem('cys_config') || '{}');
  const root = document.documentElement;

  const temas = {
    oscuro: {
      '--fondo':'#011936','--fondo-card':'#0a2240','--fondo-card2':'#0d2a4d',
      '--texto':'#e2e8f0','--texto-muted':'#7a9bbf','--azul-claro':'#4DA8DA',
      '--azul-borde':'rgba(77,168,218,.2)','--azul-oscuro':'#05244a',
      '--verde':'#2ecc71','--rojo':'#c0392b','--blanco':'#e8edf2','--gris-claro':'#8899aa',
    },
 claro: {
  '--fondo':        '#f0f4f8',
  '--fondo-card':   '#ffffff',
  '--fondo-card2':  '#e8eef5',
  '--texto':        '#1a2a3a',      // ← texto oscuro para que se vea en cards blancas
  '--texto-muted':  '#4a6a8a',      // ← subtítulos más oscuros también
  '--azul-claro':   '#B22A1A',
  '--azul-borde':   'rgba(178,42,26,.18)',
  '--azul-oscuro':  '#ddeaf5',
  '--verde':        '#1a8a4a',
  '--rojo':         '#B22A1A',
  '--blanco':       '#1a2a3a',
  '--gris-claro':   '#3a5a7a',      // ← más oscuro para labels de tabla
},
    'alto-contraste': {
      '--fondo':'#000000','--fondo-card':'#0a0a0a','--fondo-card2':'#111111',
      '--texto':'#ffffff','--texto-muted':'#cccccc','--azul-claro':'#00cfff',
      '--azul-borde':'rgba(0,207,255,.4)','--azul-oscuro':'#001a22',
      '--verde':'#00ff88','--rojo':'#ff4444','--blanco':'#ffffff','--gris-claro':'#aaaaaa',
    },
    sepia: {
      '--fondo':'#1a0f05','--fondo-card':'#2c1f0e','--fondo-card2':'#3d2b14',
      '--texto':'#f5e6c8','--texto-muted':'#a08060','--azul-claro':'#d4a060',
      '--azul-borde':'rgba(212,160,96,.25)','--azul-oscuro':'#150c04',
      '--verde':'#7ab870','--rojo':'#c05030','--blanco':'#f5e6c8','--gris-claro':'#907060',
    },
  };

  const densidades = {
    compacto: { '--card-padding':'.75rem',  '--gap-base':'.4rem',  '--font-base':'.8rem'   },
    normal:   { '--card-padding':'1.25rem', '--gap-base':'.75rem', '--font-base':'.875rem' },
    relajado: { '--card-padding':'1.75rem', '--gap-base':'1.1rem', '--font-base':'.95rem'  },
  };

  const tema     = temas[cfg.tema]          || temas.oscuro;
  const densidad = densidades[cfg.densidad] || densidades.normal;

  Object.entries({ ...tema, ...densidad }).forEach(([k,v]) => root.style.setProperty(k, v));

  if (cfg.tema) document.body && (document.body.style.background = tema['--fondo']);
})();
</script>


</head>

<body>

  <!-- HEADER -->
  <header class="cys-header">
    <div class="cys-header__brand">
      <img src="{% static 'img/logo.jpeg' %}" alt="Logo CYS" class="cys-header__logo">
      <div>
        <div class="cys-header__title">Tablero de Control</div>
        <div class="cys-header__sub">
          <span>Licorera C Y S</span>
          <span class="cys-dot"></span>
        </div>
      </div>
    </div>
    <div class="cys-header__clock">
      <div id="reloj" class="cys-header__clock-time">12:00 p. m.</div>
      <div id="fecha" class="cys-header__clock-date">—</div>
    </div>
  </header>

  <!-- SUBNAV -->
  <nav class="cys-subnav">
    <span class="cys-subnav__page">
      {% block page_title %}Tablero{% endblock %}
    </span>
    <button class="cys-menu-btn" id="menuBtn">
      <i class="bi bi-list"></i> Menú
    </button>
  </nav>

  <!-- ASIDE -->
  {% include 'partials/aside.html' %}

  <!-- CONTENIDO -->
  <main class="cys-main">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // ── RELOJ ─────────────────────────────────────────────
    let relojIntervalo = null;
    function actualizarReloj() {
      const ahora = new Date();
      let horas = ahora.getHours();
      let minutos = ahora.getMinutes();
      const ampm = horas >= 12 ? "p. m." : "a. m.";
      horas = horas % 12 || 12;
      minutos = minutos < 10 ? "0" + minutos : minutos;
      const dias  = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
      const meses = ["Enero","Febrero","Marzo","Abril","Mayo","Junio",
                     "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
      const relojEl = document.getElementById("reloj");
      const fechaEl = document.getElementById("fecha");
      if (relojEl) relojEl.textContent = `${horas}:${minutos} ${ampm}`;
      if (fechaEl) fechaEl.textContent =
        `${dias[ahora.getDay()]}, ${ahora.getDate()} de ${meses[ahora.getMonth()]}`;
    }
    if (!relojIntervalo) {
      actualizarReloj();
      relojIntervalo = setInterval(actualizarReloj, 60000);
    }

    // ── SIDEBAR ───────────────────────────────────────────
    const sidebar   = document.getElementById('sidebarRight');
    const bsSidebar = new bootstrap.Offcanvas(sidebar);

    if (localStorage.getItem('sidebarOpen') === 'true') {
      bsSidebar.show();
      document.body.classList.add('sidebar-open');
    }

    sidebar.addEventListener('show.bs.offcanvas', () => {
      document.body.classList.add('sidebar-open');
      localStorage.setItem('sidebarOpen', 'true');
    });

    sidebar.addEventListener('hidden.bs.offcanvas', () => {
      document.body.classList.remove('sidebar-open');
      localStorage.setItem('sidebarOpen', 'false');
    });

    document.getElementById('menuBtn').addEventListener('click', function() {
      sidebar.classList.contains('show') ? bsSidebar.hide() : bsSidebar.show();
    });

    document.querySelectorAll('[data-bs-dismiss="offcanvas"]').forEach(btn => {
      btn.addEventListener('click', () => bsSidebar.hide());
    });

    // ── SUBMENÚ VENTAS ────────────────────────────────────
    function toggleVentas(e, el) {
      const submenu = document.getElementById('submenuVentas');
      const chevron = el.querySelector('.cys-chevron');
      const path    = window.location.pathname;

      if (path.startsWith('/ventas/')) {
        e.preventDefault();
        submenu.classList.toggle('abierto');
        el.classList.toggle('abierto');
        chevron.classList.toggle('abierto');
      }
    }

    // ── SUBMENÚ DEVOLUCIONES ──────────────────────────────
    function toggleDevoluciones(e, el) {
      const submenu = document.getElementById('submenuDevoluciones');
      const chevron = el.querySelector('.cys-chevron');
      const path    = window.location.pathname;

      if (path.startsWith('/ventas/devoluciones/')) {
        e.preventDefault();
        submenu.classList.toggle('abierto');
        el.classList.toggle('abierto');
        chevron.classList.toggle('abierto');
      }
    }

    // ── SUBMENÚ PROVEEDORES ───────────────────────────────
    function toggleProveedores(e, el) {
      const submenu = document.getElementById('submenuProveedores');
      const chevron = el.querySelector('.cys-chevron');
      const path    = window.location.pathname;

      if (path.startsWith('/proveedores/') || path.startsWith('/compra/')) {
        e.preventDefault();
        submenu.classList.toggle('abierto');
        el.classList.toggle('abierto');
        chevron.classList.toggle('abierto');
      }
    }

    // ── APERTURA AUTOMÁTICA SEGÚN RUTA ───────────────────
    document.addEventListener('DOMContentLoaded', function() {
      const path = window.location.pathname;

      // Ventas
      if (path.startsWith('/ventas/') || path.startsWith('/reportes')) {
        const submenu = document.getElementById('submenuVentas');
        const parent  = document.getElementById('btnVentas');
        if (submenu) submenu.classList.add('abierto');
        if (parent)  parent.classList.add('abierto');
      }

      // Devoluciones
      if (path.startsWith('/ventas/devoluciones/')) {
        const submenu = document.getElementById('submenuDevoluciones');
        const parent  = document.getElementById('btnDevoluciones');
        if (submenu) submenu.classList.add('abierto');
        if (parent)  parent.classList.add('abierto');
      }

      // Proveedores / Compras
      if (path.startsWith('/proveedores/') || path.startsWith('/compra/')) {
        const submenu = document.getElementById('submenuProveedores');
        const parent  = document.getElementById('btnProveedores');
        if (submenu) submenu.classList.add('abierto');
        if (parent)  parent.classList.add('abierto');
      }
    });
  </script>

  {% block extra_js %}{% endblock %}

</body>
</html>
