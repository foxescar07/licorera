{% load static %}

<div class="offcanvas offcanvas-end"
     tabindex="-1"
     id="sidebarRight"
     data-bs-backdrop="false"
     data-bs-scroll="true">

  <!-- HEADER -->
  <div class="cys-sb-header">
    <div class="cys-sb-brand">
      <img src="{% static 'img/logo.jpeg' %}" class="cys-sb-logo">
      <div>
        <div class="cys-sb-brand-name">CYS Ltda</div>
        <div class="cys-sb-brand-sub">Distribución</div>
      </div>
    </div>
    <button class="cys-sb-close" data-bs-dismiss="offcanvas">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>

  <!-- BODY -->
  <div class="cys-sb-body">

    <!-- Usuario -->
    <div class="cys-sb-user">
      <div class="cys-sb-avatar">
        <i class="bi bi-person-fill"></i>
      </div>
      <div>
        <div class="cys-sb-user-name">Usuario</div>
        <div class="cys-sb-user-role">Administrador</div>
      </div>
    </div>

    <!-- Nav -->
    <div>
      <div class="cys-sb-label">Navegación</div>
      <nav class="cys-sb-nav">
        <a href="{% url 'home' %}" class="cys-sb-link {% block nav_tablero %}{% endblock %}">
          <i class="bi bi-grid-1x2-fill"></i> Tablero
        </a>
        <a href="{% url 'producto:producto_lista' %}" class="cys-sb-link {% block nav_productos %}{% endblock %}">
          <i class="bi bi-box-seam-fill"></i> Productos
        </a>
        <a href="{% url 'proveedores' %}" class="cys-sb-link {% block nav_proveedores %}{% endblock %}">
          <i class="bi bi-truck"></i> Proveedores
        </a>
        <a href="{% url 'reportes' %}" class="cys-sb-link {% block nav_reportes %}{% endblock %}">
          <i class="bi bi-bar-chart-fill"></i> Reportes
        </a>
      </nav>
    </div>

    <hr class="cys-sb-divider">

    <!-- Resumen -->
    <div>
      <div class="cys-sb-label">Resumen</div>
      <div class="d-flex flex-column gap-2">

        <div class="cys-sb-stat">
          <div>
            <div class="cys-sb-stat-label">Total productos</div>
            <div class="cys-sb-stat-val">110</div>
            <div class="cys-sb-stat-sub">unidades en stock</div>
          </div>
          <span class="cys-sb-dot bg-success"></span>
        </div>

        <div class="cys-sb-stat">
          <div>
            <div class="cys-sb-stat-label">Stock crítico</div>
            <div class="cys-sb-stat-val">1</div>
            <div class="cys-sb-stat-sub">producto por reponer</div>
          </div>
          <span class="cys-sb-dot bg-danger"></span>
        </div>

        <div class="cys-sb-stat">
          <div>
            <div class="cys-sb-stat-label">Categorías</div>
            <div class="cys-sb-stat-val">4</div>
            <div class="cys-sb-stat-sub">activas</div>
          </div>
          <span class="cys-sb-dot bg-warning"></span>
        </div>

      </div>
    </div>

    <div class="cys-sb-footer">
      CYS Ltda &copy; {% now "Y" %}
    </div>

  </div>
</div>
