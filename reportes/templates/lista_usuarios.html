{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYS - Gestión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="d-flex flex-column min-vh-100" style="background-color: #E8C898; font-family: sans-serif;">

    <!-- Botones Superiores -->
    <div class="w-100 d-flex justify-content-between p-4">
        <button class="btn fw-bold px-3 py-2 text-white border-0 shadow-sm" style="background-color: #B7372A; border-radius: 8px;" data-bs-toggle="collapse" data-bs-target="#seccionRecuperar">
            Olvidé mi contraseña
        </button>
        <button class="btn fw-bold px-3 py-2 text-white border-0 shadow-sm" style="background-color: #B7372A; border-radius: 8px;" data-bs-toggle="collapse" data-bs-target="#seccionRegistro">
            Crear cuenta
        </button>
    </div>

    <!-- Contenedor de Formularios -->
    <div class="flex-grow-1 d-flex flex-column align-items-center justify-content-center" style="margin-top: -50px;">
        <div class="card border-0 shadow-lg p-5 rounded-5 text-center" id="contenedorPrincipal" style="background-color: #f1e9dc; width: 100%; max-width: 420px;">
            
            <div class="mb-4">
                <img src="{% static 'img/logo.jpeg' %}" alt="Logo" class="rounded-circle shadow-sm" style="width: 100px; height: 100px; object-fit: cover; border: 2px solid #B7372A;">
            </div>

            <!-- Login -->
            <div class="collapse show" id="seccionLogin" data-bs-parent="#contenedorPrincipal">
                <h2 class="fw-bold mb-2" style="color: #B7372A;">CYS</h2>
                <input type="text" class="form-control mb-3 text-center" placeholder="Usuario">
                <input type="password" class="form-control mb-4 text-center" placeholder="Contraseña">
                <button class="btn w-100 fw-bold py-2 text-white shadow-sm" style="background-color: #B7372A; border-radius: 10px;">Guardar</button>
            </div>

            <!-- Registro -->
            <div class="collapse" id="seccionRegistro" data-bs-parent="#contenedorPrincipal">
                <h2 class="fw-bold mb-4">Registro</h2>
                <input type="text" class="form-control mb-3 text-center" placeholder="Nombre completo">
                <button class="btn w-100 text-white" style="background-color: #B7372A;">Guardar usuario</button>
                <button class="btn btn-link mt-3 text-danger fw-bold" data-bs-toggle="collapse" data-bs-target="#seccionLogin">Volver</button>
            </div>

            <!-- Recuperar -->
            <div class="collapse" id="seccionRecuperar" data-bs-parent="#contenedorPrincipal">
                <h2 class="fw-bold mb-4">Recuperar</h2>
                <input type="email" class="form-control mb-4 text-center" placeholder="Correo">
                <button class="btn w-100 text-white" style="background-color: #B7372A;">Enviar</button>
                <button class="btn btn-link mt-3 text-danger fw-bold" data-bs-toggle="collapse" data-bs-target="#seccionLogin">Volver</button>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
