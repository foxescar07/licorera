{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYS - Gestión Licorera</title>
    <!-- Bootstrap para que los botones y cuadros funcionen -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="d-flex flex-column min-vh-100" style="background-color: #E8C898; font-family: sans-serif;">

    <!-- BOTONES DE LAS ESQUINAS (Recuperación y Registro) -->
    <div class="w-100 d-flex justify-content-between p-4">
        <button class="btn fw-bold px-3 py-2 text-white border-0 shadow-sm" 
                style="background-color: #B7372A; border-radius: 8px;" 
                data-bs-toggle="collapse" data-bs-target="#seccionRecuperar">
            Olvidé mi contraseña
        </button>
        <button class="btn fw-bold px-3 py-2 text-white border-0 shadow-sm" 
                style="background-color: #B7372A; border-radius: 8px;" 
                data-bs-toggle="collapse" data-bs-target="#seccionRegistro">
            Crear cuenta
        </button>
    </div>

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="flex-grow-1 d-flex flex-column align-items-center justify-content-center" style="margin-top: -50px;">
        <div class="card border-0 shadow-lg p-5 rounded-5 text-center" id="contenedorPrincipal" style="background-color: #f1e9dc; width: 100%; max-width: 420px;">
            
            <!-- LOGO CIRCULAR -->
            <div class="mb-4">
                <img src="{% static 'img/logo.jpeg' %}" alt="Logo" class="rounded-circle shadow-sm" 
                     style="width: 100px; height: 100px; object-fit: cover; border: 2px solid #B7372A;">
            </div>

            <!-- ALERTAS DE MENSAJES (Aquí sale lo de Luna 555) -->
            {% if mensaje %}
                <div class="alert alert-success p-2 small mb-3">{{ mensaje }}</div>
            {% endif %}
            {% if error %}
                <div class="alert alert-danger p-2 small mb-3">{{ error }}</div>
            {% endif %}

            <!-- SECCIÓN: LOGIN (EL QUE ABRE PRIMERO) -->
            <div class="collapse show" id="seccionLogin" data-bs-parent="#contenedorPrincipal">
                <h2 class="fw-bold mb-2" style="color: #B7372A;">CYS</h2>
                <p class="text-secondary small mb-4">Ingresa tus credenciales</p>
                <form method="POST">
                    {% csrf_token %}
                    <input type="text" name="usuario_input" class="form-control mb-3 py-2 text-center border-0 shadow-sm" placeholder="Usuario" required>
                    <input type="password" name="clave_input" class="form-control mb-4 py-2 text-center border-0 shadow-sm" placeholder="Contraseña" required>
                    <button type="submit" class="btn w-100 fw-bold py-2 text-white shadow-sm" style="background-color: #B7372A; border-radius: 10px;">
                        Guardar
                    </button>
                </form>
            </div>

            <!-- SECCIÓN: REGISTRO (SE ACTIVA CON EL BOTÓN DERECHO) -->
            <div class="collapse" id="seccionRegistro" data-bs-parent="#contenedorPrincipal">
                <h2 class="fw-bold mb-4" style="color: #212529;">Registro usuario</h2>
                <form>
                    <input type="text" class="form-control mb-3 py-2 text-center" placeholder="Identificación">
                    <input type="text" class="form-control mb-3 py-2 text-center" placeholder="Nombre completo">
                    <button type="button" class="btn w-100 text-white fw-bold shadow-sm" style="background-color: #B7372A; border-radius: 10px;">
                        Guardar usuario
                    </button>
                </form>
                <button class="btn btn-link mt-3 text-danger fw-bold text-decoration-none" data-bs-toggle="collapse" data-bs-target="#seccionLogin">
                    Volver al Inicio
                </button>
            </div>

            <!-- SECCIÓN: RECUPERAR (SE ACTIVA CON EL BOTÓN IZQUIERDO) -->
            <div class="collapse" id="seccionRecuperar" data-bs-parent="#contenedorPrincipal">
                <h2 class="fw-bold mb-2" style="color: #B7372A;">Recuperar</h2>
                <p class="small text-secondary mb-3">Ingresa tu correo para enviarte la clave</p>
                <form>
                    <input type="email" class="form-control mb-4 py-2 text-center" placeholder="Correo electrónico">
                    <button type="button" class="btn w-100 text-white fw-bold shadow-sm" style="background-color: #B7372A; border-radius: 10px;">
                        Enviar Clave
                    </button>
                </form>
                <button class="btn btn-link mt-3 text-danger fw-bold text-decoration-none" data-bs-toggle="collapse" data-bs-target="#seccionLogin">
                    Volver al Inicio
                </button>
            </div>
        </div>
    </div>

    <!-- SCRIPTS PARA QUE LOS BOTONES FUNCIONEN (NO LOS QUITES) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
