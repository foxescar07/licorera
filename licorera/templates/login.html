{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYS - Gestión Licorera</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100" style="background-color: #E5E7EB; font-family: 'Roboto', sans-serif;">

    <!-- BOTONES SUPERIORES CON GLOW -->
    <div class="w-100 d-flex justify-content-between p-4">
        <button class="btn text-white px-4 fw-bold" 
                style="background-color: #B7372A; border-radius: 15px; font-family: 'Oswald', sans-serif; border: none; box-shadow: 0 0 15px rgba(230, 46, 26, 0.4);" 
                data-bs-toggle="collapse" data-bs-target="#seccionRecuperar">Olvidé mi contraseña</button>
        
        <button class="btn text-white px-4 fw-bold" 
                style="background-color: #B7372A; border-radius: 15px; font-family: 'Oswald', sans-serif; border: none; box-shadow: 0 0 15px rgba(231, 63, 44, 0.4);" 
                data-bs-toggle="collapse" data-bs-target="#seccionRegistro">Crear cuenta</button>
    </div>

    <div class="flex-grow-1 d-flex flex-column align-items-center justify-content-center" style="margin-top: -60px;">
        <!-- CARD PRINCIPAL: BORDES 15PX Y SOMBRA SUAVE -->
        <div class="card border-0 p-5 text-center" id="contenedorPrincipal" 
             style="background-color: #FFFFFF; width: 100%; max-width: 420px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.12);">
            
            <div class="mb-4">
                <img src="{% static 'img/logo.jpeg' %}" alt="Logo" class="rounded-circle" 
                     style="width: 120px; height: 120px; object-fit: cover; border: 4px solid #B7372A; box-shadow: 0 0 15px rgba(183, 55, 42, 0.2);">
            </div>

            <!-- SECCIÓN LOGIN -->
            <div class="collapse show" id="seccionLogin" data-bs-parent="#contenedorPrincipal">
                <h1 class="fw-bold mb-4" style="color: #B7372A; font-family: 'Oswald', sans-serif; letter-spacing: 1px;">CYS</h1>
                
                <form method="POST">
                    {% csrf_token %}
                    <input type="hidden" name="accion" value="login">
                    
                    <div class="mb-3">
                        <input type="text" name="usuario_input" class="form-control text-center py-3 border-0 shadow-sm" 
                               placeholder="Usuario" style="border-radius: 15px; font-family: 'Roboto', sans-serif; background-color: #ffffff;" required>
                    </div>
                    
                    <div class="mb-4">
                        <input type="password" name="clave_input" class="form-control text-center py-3 border-0 shadow-sm" 
                               placeholder="Contraseña" style="border-radius: 15px; font-family: 'Roboto', sans-serif; background-color: #ffffff;" required>
                    </div>
                    
                    <!-- BOTÓN ENTRAR CON EFECTO NEÓN/GLOW -->
                    <button type="submit" class="btn w-100 py-2 fw-bold text-white shadow" 
                            style="background-color: #B7372A; border-radius: 15px; font-family: 'Oswald', sans-serif; border: none; box-shadow: 0 4px 20px rgba(183, 55, 42, 0.5);">
                        ENTRAR
                    </button>
                </form>
            </div>

            <!-- SECCIÓN REGISTRO (OCULTA POR DEFECTO) -->
            <div class="collapse" id="seccionRegistro" data-bs-parent="#contenedorPrincipal">
                <h3 class="fw-bold mb-3" style="font-family: 'Oswald', sans-serif; color: #B7372A;">CREAR CUENTA</h3>
                <form method="POST">
                    {% csrf_token %}
                    <input type="hidden" name="accion" value="registrar">
                    <input type="text" name="nombre_input" class="form-control mb-2 text-center shadow-sm border-0 py-2" placeholder="Nombre completo" style="border-radius: 15px;">
                    <input type="text" name="user_nuevo" class="form-control mb-2 text-center shadow-sm border-0 py-2" placeholder="Usuario" style="border-radius: 15px;">
                    <input type="password" name="pass_nueva" class="form-control mb-3 text-center shadow-sm border-0 py-2" placeholder="Contraseña" style="border-radius: 15px;">
                    
                    <select name="rol_nuevo" class="form-select mb-3 text-center shadow-sm border-0" style="border-radius: 15px; cursor: pointer;">
                        <option value="empleado">Empleado</option>
                        <option value="admin">Administrador</option>
                    </select>

                    <button type="submit" class="btn w-100 text-white fw-bold py-2 shadow" style="background-color: #E5E7EB; border-radius: 15px; font-family: 'Oswald', sans-serif;">GUARDAR</button>
                </form>
                <button class="btn btn-link text-danger mt-2 fw-bold text-decoration-none small" data-bs-toggle="collapse" data-bs-target="#seccionLogin">Volver</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
