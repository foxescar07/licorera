{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYS - Gestión Licorera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #E8C898; /* Fondo beige oscuro */
            font-family: sans-serif;
        }
        .login-card {
            background-color: #f1e9dc; /* Fondo beige claro de la tarjeta */
            border-radius: 25px; /* Bordes muy redondeados */
            border: none;
            width: 100%;
            max-width: 400px; /* Ancho máximo de la tarjeta */
        }
        .btn-custom {
            background-color: #B7372A; /* Rojo personalizado */
            color: white;
            border-radius: 10px;
            font-weight: bold;
        }
        .btn-custom:hover {
            background-color: #a03025; /* Rojo más oscuro al pasar el mouse */
            color: white;
        }
        .logo-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 50%; /* Logo circular */
            border: 2px solid #B7372A; /* Borde rojo en el logo */
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <div class="w-100 d-flex justify-content-between p-4">
        <button class="btn btn-custom px-4 shadow-sm">Olvidé mi contraseña</button>
        <button class="btn btn-custom px-4 shadow-sm">Crear cuenta</button>
    </div>

    <div class="flex-grow-1 d-flex flex-column align-items-center justify-content-center" style="margin-top: -50px;">
        <div class="card login-card shadow-lg p-5 text-center">
            
            <div class="mb-4">
                <img src="{% static 'img/logo.jpeg' %}" alt="Logo CYS" class="logo-img shadow-sm">
            </div>

            <h2 class="fw-bold mb-2" style="color: #B7372A;">CYS</h2>
            <p class="text-secondary small mb-4">Ingresa tus credenciales</p>

            {% if mensaje %}
                <div class="alert alert-success p-2 small">{{ mensaje }}</div>
            {% endif %}
            {% if error %}
                <div class="alert alert-danger p-2 small">{{ error }}</div>
            {% endif %}

            <form method="POST">
                {% csrf_token %} <div class="mb-3">
                    <input type="text" name="usuario_input" class="form-control text-center py-2 border-0 shadow-sm" placeholder="Usuario" style="background-color: #fff; border-radius: 8px;" required>
                </div>
                
                <div class="mb-4">
                    <input type="password" name="clave_input" class="form-control text-center py-2 border-0 shadow-sm" placeholder="Contraseña" style="background-color: #fff; border-radius: 8px;" required>
                </div>
                
                <button type="submit" class="btn btn-custom w-100 py-2 shadow">
                    Guardar
                </button>
            </form>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
