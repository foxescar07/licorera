{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYS - Gestión Licorera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100" style="background-color: #E8C898;">

    <!-- BOTONES SUPERIORES (CONECTADOS) -->
    <div class="w-100 d-flex justify-content-between p-4">
        <button class="btn text-white px-4 shadow-sm fw-bold" style="background-color: #B7372A;" 
                data-bs-toggle="collapse" data-bs-target="#seccionRecuperar">Olvidé mi contraseña</button>
        
        <button class="btn text-white px-4 shadow-sm fw-bold" style="background-color: #B7372A;" 
                data-bs-toggle="collapse" data-bs-target="#seccionRegistro">Crear cuenta</button>
    </div>

    <div class="flex-grow-1 d-flex flex-column align-items-center justify-content-center" style="margin-top: -50px;">
        <div class="card border-0 shadow-lg p-5 text-center rounded-5" id="contenedorPrincipal" style="background-color: #f1e9dc; width: 100%; max-width: 400px;">
            
            <div class="mb-4">
                <img src="{% static 'img/logo.jpeg' %}" alt="Logo" class="rounded-circle shadow-sm border border-2 border-danger" style="width: 100px; height: 100px; object-fit: cover;">
            </div>

            <!-- ALERTAS DE DJANGO -->
            {% if mensaje %}<div class="alert alert-success p-2 small">{{ mensaje }}</div>{% endif %}
            {% if error %}<div class="alert alert-danger p-2 small">{{ error }}</div>{% endif %}

            <!-- SECCIÓN 1: LOGIN (VISIBLE POR DEFECTO) -->
            <div class="collapse show" id="seccionLogin" data-bs-parent="#contenedorPrincipal">
                <h2 class="fw-bold mb-4" style="color: #B7372A;">CYS</h2>
                <form method="POST">
                    {% csrf_token %}
                    <input type="hidden" name="accion" value="login">
                    <input type="text" name="usuario_input" class="form-control text-center mb-3 py-2 border-0 shadow-sm" placeholder="Usuario" required>
                    <input type="password" name="clave_input" class="form-control text-center mb-4 py-2 border-0 shadow-sm" placeholder="Contraseña" required>
                    <button type="submit" class="btn w-100 py-2 shadow fw-bold text-white" style="background-color: #B7372A; border-radius: 10px;">Entrar</button>
                </form>
            </div>

            <!-- SECCIÓN 2: REGISTRO (OCULTO) -->
            <div class="collapse" id="seccionRegistro" data-bs-parent="#contenedorPrincipal">
                <h3 class="fw-bold mb-3">Registrarse</h3>
                <form method="POST">
                    {% csrf_token %}
                    <input type="hidden" name="accion" value="registrar">
                    <input type="text" name="id_input" class="form-control mb-2 text-center shadow-sm border-0" placeholder="Identificación" required>
                    <input type="text" name="nombre_input" class="form-control mb-2 text-center shadow-sm border-0" placeholder="Nombre completo" required>
                    <input type="text" name="user_nuevo" class="form-control mb-2 text-center shadow-sm border-0" placeholder="Usuario" required>
                    <input type="password" name="pass_nueva" class="form-control mb-3 text-center shadow-sm border-0" placeholder="Clave" required>
                    
                    <select name="rol_nuevo" class="form-select mb-3 text-center shadow-sm border-0">
                        <option value="empleado">Empleado</option>
                        <option value="admin">Administrador</option>
                    </select>

                    <button type="submit" class="btn w-100 text-white fw-bold mb-2" style="background-color: #B7372A;">Guardar usuario</button>
                </form>
                <button class="btn btn-link text-danger fw-bold text-decoration-none" data-bs-toggle="collapse" data-bs-target="#seccionLogin">Volver al inicio</button>
            </div>

            <!-- SECCIÓN 3: RECUPERAR (OCULTO) -->
            <div class="collapse" id="seccionRecuperar" data-bs-parent="#contenedorPrincipal">
                <h3 class="fw-bold mb-3">Recuperar</h3>
                <p class="small text-secondary mb-4">Ingresa tu correo para enviarte la clave</p>
                <form method="POST">
                    {% csrf_token %}
                    <input type="email" class="form-control mb-4 py-2 text-center shadow-sm border-0" placeholder="Correo electrónico">
                    <button type="button" class="btn w-100 text-white fw-bold mb-2" style="background-color: #B7372A;">Enviar Clave</button>
                </form>
                <button class="btn btn-link text-danger fw-bold text-decoration-none" data-bs-toggle="collapse" data-bs-target="#seccionLogin">Volver al inicio</button>
            </div>

        </div>
    </div>

    <!-- SCRIPTS DE BOOTSTRAP (NECESARIOS PARA QUE LOS BOTONES FUNCIONEN) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
