<!DOCTYPE html>
<html>
<head>
    <title>CYS - Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #E8C898;">
    <div class="container mt-5">
        <div class="card p-5 shadow text-center">
            <h1 class="display-4">Bienvenida, {{ nombre }}</h1>
            <p class="badge bg-danger fs-5">Rol: {{ rol }}</p>
            <hr>
            
            {% if rol == 'admin' %}
                <div class="row mt-4">
                    <div class="col-md-6"><div class="p-3 bg-dark text-white rounded">Pagina principal</div></div>
                    <div class="col-md-6"><div class="p-3 bg-dark text-white rounded">Lista de usuarios registrados</div></div>
                </div>
            {% else %}
                <div class="row mt-4">
                    <div class="col-md-12"><div class="p-3 bg-primary text-white rounded">Registrar Venta Diaria</div></div>
                </div>
            {% endif %}

            <br>
            <a href="{% url 'login_url' %}" class="btn btn-outline-danger mt-4">Cerrar Sesión</a>
        </div>
    </div>
</body>
</html>
